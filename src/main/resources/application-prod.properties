# Production Environment Configuration
server.port=${PORT:8080}

# CORS Configuration (Production Vercel frontend)
app.cors.allowed-origins=https://4bitlabs-ems.vercel.app

# Database Configuration (Values strictly read from Environment Variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration (Production uses validate to ensure structure matches entities)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Cloudinary Storage Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Security - JWT Configuration
jwt.secret=${JWT_SECRET}

# Cookie Configuration (Production: HTTPS, cross-origin Vercel → Railway)
app.cookie.secure=true
app.cookie.same-site=None

# Logging Configuration (Minimal logging for performance and security)
logging.level.org.springframework=WARN
logging.level.com.fourbitlabs=INFO